name: Build, Push and Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: yeochi1201
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/brainbridge-backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/brainbridge-backend:${{ github.sha }}

      - name: Build and push nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./nginx/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/brainbridge-nginx:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/brainbridge-nginx:${{ github.sha }}

  deploy:
    name: Deploy on Oracle Cloud
    runs-on: [self-hosted, Linux, X64]
    needs: build-and-push

    steps:
      - name: Deploy with Docker Compose
        run: |
          set -e

          cd /opt/brainbridge

          git pull origin main

          docker compose pull
          docker compose up -d

          docker image prune -f

          docker ps
