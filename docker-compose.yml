services:
  postgres:
    image: postgres:16
    container_name: brainbridge-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Seoul
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - brainbridge-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: brainbridge-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    expose:
      - "8080"
    networks:
      - brainbridge-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: brainbridge-frontend-build
    volumes:
      - frontend_dist:/app/dist
    command: sh -c "npm run build && cp -r dist/* /frontend-dist"
    networks:
      - brainbridge-net

  nginx:
    image: nginx:stable-alpine
    container_name: brainbridge-nginx
    restart: always
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - frontend_dist:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - brainbridge-net

volumes:
  postgres_data:
  frontend_dist:

networks:
  brainbridge-net:
    driver: bridge
