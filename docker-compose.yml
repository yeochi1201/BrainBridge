services:
  postgres:
    image: postgres:16
    container_name: brainbridge-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Seoul
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - brainbridge-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/yeochi1201/brainbridge-backend:latest
    container_name: brainbridge-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    expose:
      - "8080"
    networks:
      - brainbridge-net

  nginx:
    image: ghcr.io/yeochi1201/brainbridge-nginx:latest
    container_name: brainbridge-nginx
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - brainbridge-net

volumes:
  postgres_data:

networks:
  brainbridge-net:
    driver: bridge
